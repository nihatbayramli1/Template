@if (User.Identity.IsAuthenticated)
            {
              <li class="nav-item dropdown scroll-to-section">
                <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  @User.Identity.Name
                </a>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                  <li>
                    <a class="dropdown-item text-dark" asp-controller="Account" asp-action="Logout">Logout</a>
                  </li>
                </ul>
              </li>
            }
            else
            {
              <li class="nav-item dropdown scroll-to-section">
                <a class="nav-link dropdown-toggle" href="#" id="authDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Account
                </a>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="authDropdown">
                  <li>
                    <a class="dropdown-item text-dark" asp-controller="Account" asp-action="Login">Login</a>
                  </li>
                  <li>
                    <a class="dropdown-item text-dark" asp-controller="Account" asp-action="Register">Register</a>
                  </li>
                </ul>
              </li>
            }
